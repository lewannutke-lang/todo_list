version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16
  - React 19
  - Tailwind CSS
  - Node.js (Backend)
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Main Todo application page with task management interface
  - path: /api/todos
    file: src/app/api/todos/route.ts
    auth_required: false
    description: REST API endpoint for CRUD operations on todos
  - path: /api/todos/[id]
    file: src/app/api/todos/[id]/route.ts
    auth_required: false
    description: REST API endpoint for individual todo operations
features:
  - name: Fetch todos on app load
    description: Retrieve all todos from the database when application starts
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - User opens application
      - Loading spinner displays
      - Todo list loads automatically
    api_calls:
      - method: GET
        endpoint: /api/todos
    auth_required: false
  - name: Create new todo
    description: Add a new todo item with text validation
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - Type todo text in input field
      - Click "Add" button or press Enter
      - New todo appears in the list
    api_calls:
      - method: POST
        endpoint: /api/todos
        body: "{ text: string }"
        response: "{ id: string, text: string, completed: boolean }"
    auth_required: false
  - name: Toggle todo completion status
    description: Mark a todo as completed or incomplete
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - Click checkbox next to a todo item
      - Todo visual state changes (strikethrough)
      - Completion status updates in database
    api_calls:
      - method: PUT
        endpoint: /api/todos/[id]
        body: "{ completed: boolean }"
        response: "{ id: string, text: string, completed: boolean }"
    auth_required: false
  - name: Delete todo
    description: Remove a todo item from the list
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - Click delete button next to a todo
      - Todo is removed from the list
      - Error message displays if deletion fails
      - Error auto-hides after 5 seconds
    api_calls:
      - method: DELETE
        endpoint: /api/todos/[id]
        response: "{ success: true } or { error: string }"
    auth_required: false
  - name: Error handling and display
    description: Display error messages when API operations fail
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - API request fails
      - Error message displays at top of page
      - User can retry the operation
      - Error auto-hides for delete operations
    api_calls: []
    auth_required: false
known_limitations:
  - issue: DELETE endpoint uses todos.remove() instead of todos.splice()
    location: src/app/api/todos/[id]/route.ts
    impact: Delete operations throw TypeError and fail on valid IDs. Expected behavior after fix requires using splice(todoIndex, 1) to properly remove todos from array.
  - issue: File-based database with synchronous I/O
    location: data/db.json and all route handlers
    impact: Database operations may have race conditions under concurrent load. Recommended to migrate to proper database for production.
  - issue: No input sanitization
    location: src/app/api/todos/route.ts
    impact: Todo text is not sanitized, potential XSS vulnerability if todo text is later displayed without escaping.
